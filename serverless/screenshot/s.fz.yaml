edition: 1.0.0
name: slide-screenshot
access: default

services:
  slide-screenshot:
    component: fc
    props:
      region: cn-beijing
      service:
        name: slide-screenshot
        role: ""
        description: slide screenshot service
        internetAccess: true
        ossMountConfig:
          mountPoints: []
      function:
        name: slide_screenshot
        description: slide screenshot function
        handler: index.handler
        runtime: nodejs16
        timeout: 60
        memorySize: 2048
        cpu: 2
        diskSize: 512
        instanceType: e1
        instanceConcurrency: 2
        codeUri: ./code
        layers:
          - acs:fc:cn-beijing:official:layers/Nodejs-Puppeteer17x/versions/3
        environmentVariables:
          COS_SECRET_ID: ${env:COS_SECRET_ID}
          COS_SECRET_KEY: ${env:COS_SECRET_KEY}
          COS_BUCKET: ${env:COS_BUCKET}
          COS_REGION: ${env:COS_REGION}
          HOST: ${env:HOST}
          SHOT_URL: https://anna0314zy.github.io/designable-editor/test/slide-shot/index.html
          LD_LIBRARY_PATH: /opt/lib
          NODE_PATH: /opt/node_modules:/opt/nodejs/node_modules
          PUPPETEER_EXECUTABLE_PATH: /opt/chromium/chrome
        asyncConfiguration:
          maxAsyncEventAgeInSeconds: 3600
          maxAsyncRetryAttempts: 3
          statefulInvocation: false
      triggers:
        - name: httpTrigger
          description: HTTP trigger for screenshot requests
          type: http
          qualifier: LATEST
          config:
            methods:
              - GET
              - POST
              - PUT
              - DELETE
            authType: anonymous
            disableURLInternet: false
