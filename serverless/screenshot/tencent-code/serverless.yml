component: scf
name: slide-screenshot-code

inputs:
  name: slide_screenshot
  namespace: default
  region: ap-beijing
  type: event
  runtime: Nodejs18.15
  handler: index.main_handler
  memorySize: 2048
  timeout: 60
  initTimeout: 60
  src:
    src: ../code
    exclude:
      - node_modules/**
      - .tmp/**
      - Dockerfile
      - package-lock.json
  layers:
    - name: slide-screenshot-node-modules
      version: ${env:TENCENT_SCF_NODE_MODULES_LAYER_VERSION}
    # Puppeteer still needs a Linux Chromium executable. Bind a Chromium layer
    # here as well, or set PUPPETEER_EXECUTABLE_PATH to a path provided by an
    # existing public/custom layer, for example /opt/bin/chromium.
    # - name: slide-screenshot-chromium
    #   version: 1
  environment:
    variables:
      COS_SECRET_KEY: ${env:COS_SECRET_KEY}
      COS_SECRET_ID: ${env:COS_SECRET_ID}
      COS_BUCKET: class-slides-res-test-1313601664
      COS_REGION: ap-beijing
      HOST: https://test-class-api-online.saasp.vdyoo.com
      SHOT_URL: https://anna0314zy.github.io/designable-editor/test/slide-shot/index.html
      PUPPETEER_EXECUTABLE_PATH: /opt/bin/chromium
      XDG_CONFIG_HOME: /tmp
