<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <title>Cocos Creator | cocos-game-player
    </title>

    <!--http://www.html5rocks.com/en/mobile/mobifying/-->
    <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true" />

    <!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">

    <!-- force webkit on 360 -->
    <meta name="renderer" content="webkit" />
    <meta name="force-rendering" content="webkit" />
    <!-- force edge on IE -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="msapplication-tap-highlight" content="no">

    <!-- force full screen on some browser -->
    <meta name="full-screen" content="yes" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="360-fullscreen" content="true" />

    <!--fix fireball/issues/3568 -->
    <!--<meta name="browsermode" content="application">-->
    <meta name="x5-page-mode" content="app">

    <!--<link rel="apple-touch-icon" href=".png" />-->
    <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

    <link rel="stylesheet" type="text/css" href="style.css" />


    <style type="text/css">
        #loading-canvas {
            margin: 20vh auto;
            display: block;
        }

        #splash {
            background: #171717;
            background-image: none;
        }
    </style>

    <style>
        @font-face {
            /* font-properties */
            font-family: huawawa;
            src: url('./huawawa.ttf');
        }

        .loading-texts {
            font-family: huawawa, sans-serif, system-ui;
        }

        html,
        body {
            -ms-touch-action: none;
            /* background: #ffffff; */
            padding: 0;
            border: 0;
            margin: 0;
            height: 100%;
        }

        #loading-full {
            height: 100%;
            pointer-events: none;
            justify-content: center;
            position: fixed;
            background: #008ef1;
            width: 100%;
            z-index: 99999999;
            top: 0;
            left: 0;
        }

        #loading-lottie {
            width: 100px;
            pointer-events: none;
            height: 120px;
            position: absolute;
            float: left;
            top: -56px;
        }

        #loading-container {
            width: 575px;
            pointer-events: none;
            height: 65px;
            left: 50%;
            margin-left: -287.5px;
            position: absolute;
            bottom: 0;
            z-index: 999999;
        }

        #loading-bg {
            height: 100%;
            width: 100%;
            object-fit: fill;
            z-index: 1000;
            position: relative;
        }

        .loading-text {
            position: absolute;
            color: #fff;
            top: 50%;
            left: 50%;
            margin-top: -1.75rem;
            margin-left: -10rem;
            font-size: 3.5rem;
        }

        .loading {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .loading p {
            float: left;
            color: #fff;
            font-size: 3.5rem;
            margin: 0;
            padding-right: 8px;
        }

        p {
            font-family: PingFangSC-Regular;
            font-size: 14px;
            color: #666666;
            letter-spacing: 0;
            line-height: 14px;
            margin-top: 16px;
        }

        .line-loading {
            float: left;
        }

        .line-loading>div {
            width: 10px;
            height: 10px;
            background-color: #fff;

            border-radius: 100%;
            display: inline-block;
            -webkit-animation: bouncedelay 2s infinite ease-in-out;
            animation: bouncedelay 2s infinite ease-in-out;
            /* Prevent first frame from flickering when animation starts */
            -webkit-animation-fill-mode: both;
            animation-fill-mode: both;
        }

        .line-loading .bounce1 {
            -webkit-animation-delay: -1.5s;
            animation-delay: -1.5s;
            background: #ffffff;
        }

        .line-loading .bounce2 {
            -webkit-animation-delay: -1s;
            animation-delay: -1s;
            background: #ffffff;
        }

        .line-loading .bounce3 {
            -webkit-animation-delay: -0.3s;
            animation-delay: -0.3s;
            background: #ffffff;
        }

        @-webkit-keyframes bouncedelay {

            0%,
            80%,
            100% {
                -webkit-transform: scale(0);
            }

            40% {
                -webkit-transform: scale(1);
            }
        }

        @keyframes bouncedelay {

            0%,
            80%,
            100% {
                transform: scale(0);
                -webkit-transform: scale(0);
            }

            40% {
                transform: scale(1);
                -webkit-transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
    <div id="splash">
        <div class="progress-bar stripes" style="display: none">
            <span style="width: 0%"></span>
        </div>
    </div>

    <div id="GameDiv">
        <!-- 打开相册或读取电脑本地图片  -->
        <!-- <input id="OpenImageFile" type="file" capture="camera" accept="image/*" style="visibility: hidden"> -->
        <input id="OpenImageFile" type="file" accept="image/*" style="visibility: hidden">
        <!-- 打开相册或读取电脑本地音频  -->
        <input id="OpenAudioFile" type="file" accept="audio/*" style="visibility: hidden">
    </div>


    <script>
        this.theRequest = new Object();
        var url = location.search; //获取url中"?"符后的字串

        if (url.indexOf('?') != -1) {
            var str = url.substr(1);
            var strs = str.split('&');
            for (var i = 0; i < strs.length; i++) {
                this.theRequest[strs[i].split('=')[0]] = decodeURIComponent(strs[i].split('=')[1]);
            }
        }
        var isOnline = this.theRequest['env'] == 'online' ? true : false; //判断是线上环境还是测试环境。
        window['isOnline'] = isOnline;
    </script>
    <script src="dist/ali-log.js" charset="utf-8"></script>
    <script src="dist/cos-js-sdk-v5.js"></script>
    <script src="dist/cos-msg.js" charset="utf-8"></script>
    <script src="dist/game-msg.js" charset="utf-8"></script>

    <script type="text/javascript">
        (function () {
            //注册app监听方法
            window.gameMsg.addMessageListener();
            //错误上报
            var url = location.search; //获取url中"?"符后的字串
            var theRequest = new Object();
            if (url.indexOf('?') != -1) {
                var str = url.substr(1);
                var strs = str.split('&');
                for (var i = 0; i < strs.length; i++) {
                    theRequest[strs[i].split('=')[0]] = decodeURIComponent(strs[i].split('=')[1]);
                }
            }

            const isSubgame = theRequest['isSubGame'] == "1" ? true : false;
            const msgRestartGame = isSubgame ? 'sub_restartGame' : 'restartGame';
            const msgWebgllost = isSubgame ? 'sub_webgllost' : 'webgllost';
            let oldErrMap = new Map();
            let errSum = 0;
            let restartGame = false;
            //相同的错误1秒只上报一次
            setInterval(() => {
                oldErrMap.clear();
            }, 1000);
            //每3秒 重置错误次数 3秒内总次数超过20次通知mcc重启游戏
            setInterval(() => {
                errSum = 0;
            }, 3000);
            //错误上报 1秒最多上报一条
            let reportError = (error) => {
                if (!oldErrMap.has(error)) {
                    oldErrMap.set(error, 1);
                    aliLogMsg.error('CoursewareErrorLogEvent', error);
                }
            }
            window.addEventListener(
                'error',
                function (event) {
                    console.log(event.error, '       addEventListener');
                    let curErr = event.error.stack;
                    reportError(event.error.message);
                    reportError(event.error.stack.split('\n'));
                    errSum++;
                    if (errSum > 20 && !restartGame) {
                        restartGame = true;
                        reportError(msgRestartGame);
                        iframeMsg.send_as_message({
                            type: msgRestartGame, data: null
                        });
                    }
                },
                true,
            );

            window.console.error = function () {
                if (typeof arguments[0] == 'object') {
                    var alt = {};
                    Object.getOwnPropertyNames(arguments[0]).forEach(function (key) {
                        alt[key] = this[key];
                    }, arguments[0]);
                    reportError(alt);
                } else {
                    reportError(arguments[0]);
                    if (arguments[0] === 'This device does not support webgl') {
                        iframeMsg.send_as_message({
                            type: msgWebgllost, date: null
                        });
                    }
                }
                console.warn.apply(window, ['console.error: ', ...arguments]);
            };

            var gameId =
                theRequest['gameId'] == '' || theRequest['gameId'] == undefined ? -1 : theRequest['gameId'];
            aliLogMsg.init(
                theRequest['chapterId'],
                theRequest['userId'],
                theRequest['coursewareId'],
                gameId,
                window['env'],
            );
            aliLogMsg.engineLoadStart();

            //引擎加载
            var splash = document.getElementById('splash');
            splash.style.display = 'block';

            // 监听 webgl lost 事件
            var canvas = document.getElementById('GameCanvas');
            canvas.addEventListener(
                'webglcontextlost',
                (event) => {
                    reportError('webglcontextlost');
                    console.log('webglcontextlost');
                    event.preventDefault();
                    iframeMsg.request_webglcontextlost();
                },
                false,
            );
        })();
    </script>
    
<!-- Polyfills bundle. -->
<script src="src/polyfills.bundle.js" charset="utf-8"> </script>

<!-- SystemJS support. -->
<script src="src/system.bundle.js" charset="utf-8"> </script>

<!-- Import map -->
<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    System.import('./index.js').catch(function(err) { console.error(err); })
</script>

</body>

</html>
