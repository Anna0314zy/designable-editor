name: Deploy frontends to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deploy target
        required: true
        default: test
        type: choice
        options:
          - test
          - production

permissions:
  contents: write

concurrency:
  group: pages-${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'test' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      target_environment: ${{ steps.target.outputs.target_environment }}
      destination_dir: ${{ steps.target.outputs.destination_dir }}
      vite_mode: ${{ steps.target.outputs.vite_mode }}
    env:
      HUSKY: 0
    steps:
      - name: Resolve target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.target_environment }}" = "production" ]; then
            echo "target_environment=production" >> "$GITHUB_OUTPUT"
            echo "destination_dir=prod" >> "$GITHUB_OUTPUT"
            echo "vite_mode=prod" >> "$GITHUB_OUTPUT"
          else
            echo "target_environment=test" >> "$GITHUB_OUTPUT"
            echo "destination_dir=test" >> "$GITHUB_OUTPUT"
            echo "vite_mode=test" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build slide-shot
        run: pnpm --dir common/slide-shot run build-${{ steps.target.outputs.vite_mode }}

      - name: Build editor
        run: pnpm --dir editor exec vite build --mode ${{ steps.target.outputs.vite_mode }}

      - name: Build task
        run: pnpm --dir task exec vite build --mode ${{ steps.target.outputs.vite_mode }}

      - name: Collect Pages artifact
        run: |
          EDITOR_VERSION="$(node -p "require('./editor/package.json').version")"
          TASK_VERSION="$(node -p "require('./task/package.json').version")"

          mkdir -p pages-dist/slide-shot pages-dist/editor pages-dist/task
          cp -R common/slide-shot/dist/. pages-dist/slide-shot/
          cp -R "editor/dist/${EDITOR_VERSION}/." pages-dist/editor/
          cp -R "task/dist/${TASK_VERSION}/." pages-dist/task/

          cat > pages-dist/index.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Slides Engine</title>
              <style>
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                  background: #f6f7f9;
                  color: #1f2937;
                }

                main {
                  width: min(520px, calc(100vw - 48px));
                }

                h1 {
                  margin: 0 0 20px;
                  font-size: 28px;
                  font-weight: 650;
                }

                nav {
                  display: grid;
                  gap: 12px;
                }

                a {
                  display: block;
                  padding: 14px 16px;
                  border: 1px solid #d8dee8;
                  border-radius: 8px;
                  background: #fff;
                  color: inherit;
                  text-decoration: none;
                }

                a:hover {
                  border-color: #7c8da5;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>Slides Engine</h1>
                <nav>
                  <a href="./slide-shot/">slide-shot</a>
                  <a href="./editor/">editor</a>
                  <a href="./task/">task</a>
                </nav>
              </main>
            </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-dist
          path: pages-dist

  deploy-test:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.target_environment == 'test'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-dist
          path: pages-dist

      - name: Deploy test to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages-dist
          destination_dir: test
          keep_files: true

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.target_environment == 'production'
    environment:
      name: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-dist
          path: pages-dist

      - name: Deploy production to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages-dist
          destination_dir: prod
          keep_files: true
