name: AI Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: false
        type: string
      base:
        description: Base ref when PR number is not provided
        required: false
        default: main
        type: string
      head:
        description: Head ref when PR number is not provided
        required: false
        default: HEAD
        type: string

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      AI_REVIEW_API_KEY: ${{ secrets.AI_REVIEW_API_KEY }}
      AI_REVIEW_BASE_URL: ${{ secrets.AI_REVIEW_BASE_URL }}
      AI_REVIEW_MODEL: ${{ secrets.AI_REVIEW_MODEL }}
      AI_REVIEW_MAX_DIFF_CHARS: ${{ vars.AI_REVIEW_MAX_DIFF_CHARS || '60000' }}
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve review target
        id: target
        uses: actions/github-script@v7
        with:
          script: |
            const prNumberInput = '${{ inputs.pr_number }}'.trim();

            if (prNumberInput) {
              const prNumber = Number(prNumberInput);
              if (!Number.isInteger(prNumber) || prNumber < 1) {
                core.setFailed(`Invalid pr_number: ${prNumberInput}`);
                return;
              }

              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              core.setOutput('pr_number', String(pr.number));
              core.setOutput('pr_title', pr.title);
              core.setOutput('base_ref', `origin/${pr.base.ref}`);
              core.setOutput('head_ref', `refs/remotes/pull/${pr.number}/head`);
              return;
            }

            const base = '${{ inputs.base }}'.trim() || 'main';
            const head = '${{ inputs.head }}'.trim() || 'HEAD';
            core.setOutput('pr_number', '');
            core.setOutput('pr_title', '');
            core.setOutput('base_ref', base);
            core.setOutput('head_ref', head);

      - name: Fetch PR head
        if: ${{ steps.target.outputs.pr_number != '' }}
        run: git fetch origin "pull/${{ steps.target.outputs.pr_number }}/head:refs/remotes/pull/${{ steps.target.outputs.pr_number }}/head"

      - name: Run AI review
        run: |
          pnpm run review:ai -- \
            --scope branch \
            --base "${{ steps.target.outputs.base_ref }}" \
            --head "${{ steps.target.outputs.head_ref }}" \
            --json-out ".ai-review/ai-review-report.json" \
            --md-out ".ai-review/ai-review-report.md" \
            --summary-out ".ai-review/ai-review-summary.md" \
            --pr-number "${{ steps.target.outputs.pr_number }}" \
            --pr-title "${{ steps.target.outputs.pr_title }}" \
            --actor "${{ github.actor }}" \
            --report-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Upload AI review report
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-report
          path: .ai-review

      - name: Write workflow summary
        if: always()
        run: |
          if [ -f .ai-review/ai-review-summary.md ]; then
            cat .ai-review/ai-review-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment on PR
        if: ${{ steps.target.outputs.pr_number != '' && always() && hashFiles('.ai-review/ai-review-summary.md') != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.ai-review/ai-review-summary.md', 'utf8');
            const marker = '<!-- ai-review-orchestrator -->';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.target.outputs.pr_number }}'),
              body: `${marker}\n${body}`,
            });
