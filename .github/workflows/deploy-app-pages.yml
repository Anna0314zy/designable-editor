name: Deploy app frontends to GitHub Pages

on:
  push:
    branches:
      - test
    paths:
      - editor/**
      - task/**
      - common/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-app-pages.yml
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deploy target
        required: true
        default: test
        type: choice
        options:
          - test
          - production

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      target_environment: ${{ steps.target.outputs.target_environment }}
      destination_dir: ${{ steps.target.outputs.destination_dir }}
      vite_mode: ${{ steps.target.outputs.vite_mode }}
    env:
      HUSKY: 0
    steps:
      - name: Resolve target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.target_environment }}" = "production" ]; then
            echo "target_environment=production" >> "$GITHUB_OUTPUT"
            echo "destination_dir=prod" >> "$GITHUB_OUTPUT"
            echo "vite_mode=prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "test" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target_environment=test" >> "$GITHUB_OUTPUT"
            echo "destination_dir=test" >> "$GITHUB_OUTPUT"
            echo "vite_mode=test" >> "$GITHUB_OUTPUT"
          else
            echo "Only the test branch can auto-deploy to test. Use workflow_dispatch for production." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build editor
        run: pnpm --dir editor exec vite build --mode ${{ steps.target.outputs.vite_mode }}

      - name: Build task
        run: pnpm --dir task exec vite build --mode ${{ steps.target.outputs.vite_mode }}

      - name: Collect app artifact
        run: |
          EDITOR_VERSION="$(node -p "require('./editor/package.json').version")"
          TASK_VERSION="$(node -p "require('./task/package.json').version")"

          mkdir -p editor-dist task-dist
          cp -R "editor/dist/${EDITOR_VERSION}/." editor-dist/
          cp -R "task/dist/${TASK_VERSION}/." task-dist/

      - name: Upload editor artifact
        uses: actions/upload-artifact@v4
        with:
          name: editor-pages-dist
          path: editor-dist

      - name: Upload task artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-pages-dist
          path: task-dist

  deploy-test:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.target_environment == 'test'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: editor-pages-dist
          path: editor-dist

      - name: Download task artifact
        uses: actions/download-artifact@v4
        with:
          name: task-pages-dist
          path: task-dist

      - name: Deploy test editor to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: editor-dist
          destination_dir: test/editor
          keep_files: true

      - name: Deploy test task to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: task-dist
          destination_dir: test/task
          keep_files: true

      - name: Print test URLs
        run: |
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/test"
          {
            echo "## Test app deployment"
            echo ""
            echo "- editor: ${BASE_URL}/editor/"
            echo "- task: ${BASE_URL}/task/"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.target_environment == 'production'
    environment:
      name: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: editor-pages-dist
          path: editor-dist

      - name: Download task artifact
        uses: actions/download-artifact@v4
        with:
          name: task-pages-dist
          path: task-dist

      - name: Deploy production editor to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: editor-dist
          destination_dir: prod/editor
          keep_files: true

      - name: Deploy production task to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: task-dist
          destination_dir: prod/task
          keep_files: true

      - name: Print production URLs
        run: |
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/prod"
          {
            echo "## Production app deployment"
            echo ""
            echo "- editor: ${BASE_URL}/editor/"
            echo "- task: ${BASE_URL}/task/"
          } >> "$GITHUB_STEP_SUMMARY"
