services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: slides
      POSTGRES_PASSWORD: slides
      POSTGRES_DB: slides_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slides -d slides_engine"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env.example
    ports:
      - "5177:5177"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
