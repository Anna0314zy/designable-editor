<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slides Engine</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1f2937;
      }

      main {
        width: min(520px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 20px;
        font-size: 28px;
        font-weight: 650;
      }

      nav {
        display: grid;
        gap: 12px;
      }

      a {
        display: block;
        padding: 14px 16px;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        background: #fff;
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        border-color: #7c8da5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Slides Engine</h1>
      <nav>
        <a href="./slide-shot/">slide-shot</a>
        <a href="./editor/">editor</a>
        <a href="./task/">task</a>
      </nav>
    </main>
  </body>
</html>
